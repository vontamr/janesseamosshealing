<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Cancelled | Janesse's Seamoss Creation</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
function initTailwind() {
    tailwind.config = {
        content: ["./**/*.{html,js}"],
        theme: {
            extend: {
                colors: {
                    deep: '#260B3A',
                    purple: '#5E0089',
                    lightpurple: '#EAD5F8',
                }
            }
        }
    };
}
window.addEventListener('load', initTailwind);
</script>
</head>
<body class="bg-white text-deep min-h-screen flex items-center justify-center font-sans antialiased">
<div class="text-center max-w-md mx-auto px-6 py-12">
    <div class="text-7xl mb-6">🌊😔</div>
    <h1 class="text-4xl font-light mb-4">Order Cancelled</h1>
    <p class="text-xl text-gray-600 mb-10">No charges were made to your card.<br>Your cart is still saved and ready for you.</p>

    <!-- Return to Cart Button -->
    <button onclick="window.opener ? window.opener.showCartModal() : window.location.href='shop.html'" 
            class="block w-full bg-purple hover:bg-deep text-white px-12 py-6 rounded-3xl font-semibold text-lg transition-all mb-4">
        Return to My Cart
    </button>

    <!-- Continue Shopping Button -->
    <a href="shop.html" 
       class="block w-full border-2 border-purple text-purple hover:bg-purple hover:text-white px-12 py-6 rounded-3xl font-semibold text-lg transition-all">
        Continue Shopping
    </a>

    <p class="mt-12 text-sm text-gray-500">
        Questions? Reach out anytime — we’re here to support your wellness journey.
    </p>
</div>

<script>
// Optional: If opened in new tab, still allow cart modal
if (window.opener && typeof window.opener.showCartModal === 'function') {
    console.log("✅ Cart modal available from parent window");
}
</script>
</body>
</html>
