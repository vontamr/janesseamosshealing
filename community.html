<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Seamoss Sanctuary | Janesse's Seamoss Creation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-bubble { max-width: 75%; }
        .sanctuary-message { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        video { transform: scaleX(-1); } /* Mirror selfie */
    </style>
</head>
<body class="bg-white text-deep font-sans antialiased">

    <!-- Navigation -->
    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex items-center justify-between h-20">
                <a href="index.html" class="flex items-center gap-3">
                    <img src="assets/images/IMG_7251 Background Removed 2.jpeg" alt="Logo" class="h-12">
                </a>
                <a href="index.html" class="text-purple font-medium flex items-center gap-2">
                    ← Back to Home
                </a>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-6 py-12">
        <div class="text-center mb-10">
            <div class="inline-flex items-center gap-3 bg-lightpurple/30 text-purple px-6 py-3 rounded-3xl text-sm font-medium mb-4">
                🌊 THE SEAMOSS SANCTUARY
            </div>
            <h1 class="text-5xl font-light tracking-tighter">Welcome Home, Beautiful Soul</h1>
            <p class="text-xl text-gray-600 mt-3 max-w-lg mx-auto">A sacred space to share your sea moss journey, wisdom, and healing stories with the community.</p>
        </div>

        <!-- Profile Setup -->
        <div id="profile-setup" class="bg-white border border-purple/20 rounded-3xl p-8 mb-10 hidden">
            <h3 class="text-2xl font-medium mb-4 text-center">Let’s make this personal 🌿</h3>
            <div class="max-w-md mx-auto">
                <label class="block text-sm font-medium mb-2">Your Name in the Sanctuary</label>
                <input id="user-name" type="text" placeholder="e.g. Aisha 🌸" 
                       class="w-full border border-purple/30 rounded-3xl px-6 py-4 text-lg focus:outline-none focus:border-purple">
                
                <div class="mt-6">
                    <label class="block text-sm font-medium mb-3">Add your glowing face (optional but beautiful)</label>
                    <div class="flex gap-4 items-center">
                        <button onclick="startCamera()" 
                                class="flex-1 bg-purple hover:bg-deep text-white py-4 rounded-3xl font-medium transition-all">
                            📸 Take Selfie
                        </button>
                        <button onclick="useDefaultAvatar()" 
                                class="flex-1 border border-purple text-purple py-4 rounded-3xl font-medium hover:bg-lightpurple transition-all">
                            Use Ocean Emoji
                        </button>
                    </div>
                </div>

                <video id="video" class="hidden w-full rounded-3xl mt-6 border-4 border-purple/30" autoplay playsinline></video>
                <canvas id="canvas" class="hidden"></canvas>

                <div id="photo-preview" class="hidden mt-6 text-center">
                    <img id="captured-photo" class="w-24 h-24 object-cover rounded-2xl mx-auto border-4 border-purple/30">
                    <button onclick="retakePhoto()" class="text-sm text-purple mt-3 underline">Retake photo</button>
                </div>

                <button onclick="saveProfile()" 
                        class="mt-8 w-full bg-gradient-to-r from-purple to-deep text-white py-5 rounded-3xl font-semibold text-lg">
                    Enter the Sanctuary →
                </button>
            </div>
        </div>

        <!-- Sanctuary Chat -->
        <div id="main-chat-area" class="bg-gradient-to-br from-lightpurple/30 to-white border border-purple/20 rounded-3xl p-8">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-3">
                    <span class="text-4xl">🌊</span>
                    <h2 class="text-3xl font-medium">Sanctuary Chat</h2>
                </div>
                <div class="flex items-center gap-2 text-sm text-green-600 bg-white px-4 py-2 rounded-3xl shadow-sm">
                    <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                    53 members glowing right now
                </div>
            </div>

            <!-- Messages -->
            <div id="sanctuary-chat" class="bg-white border border-purple/10 rounded-2xl h-[420px] overflow-y-auto p-5 space-y-6 mb-6"></div>

            <!-- Post Message -->
            <div class="flex gap-3 items-end">
                <div id="user-avatar-small" class="w-10 h-10 rounded-2xl border-2 border-purple/30 flex-shrink-0 overflow-hidden"></div>
                <input id="sanctuary-input" type="text" placeholder="Share your wisdom, healing story, or question..." 
                       class="flex-1 border border-purple/20 rounded-3xl px-6 py-5 focus:outline-none focus:border-purple text-base">
                <button onclick="postToSanctuary()" 
                        class="bg-purple hover:bg-deep text-white px-10 py-5 rounded-3xl font-medium transition-all active:scale-95">Send 🌿</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = { name: "", photo: "" };
        let messages = [
            { user: "Elena", photo: "🌿", text: "Just started my third jar of Thyroid Support. Feeling so balanced! Anyone else?", time: "4m" },
            { user: "Marcus", photo: "💪", text: "Sea moss + morning walks = game changer for my joints. Grateful for this space.", time: "19m" },
            { user: "Sofia", photo: "🍓", text: "The Mango blend is my daily ritual now. Tastes like sunshine in a jar ✨", time: "41m" }
        ];

        function renderChat() {
            const chatEl = document.getElementById('sanctuary-chat');
            chatEl.innerHTML = '';
            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'sanctuary-message flex gap-3';
                div.innerHTML = `
                    <div class="w-9 h-9 flex-shrink-0 text-3xl flex items-center justify-center bg-purple/10 rounded-2xl">${msg.photo}</div>
                    <div class="flex-1">
                        <div class="flex items-baseline gap-3">
                            <span class="font-medium text-purple">${msg.user}</span>
                            <span class="text-xs text-gray-400">${msg.time}</span>
                        </div>
                        <p class="text-gray-700 leading-relaxed">${msg.text}</p>
                    </div>
                `;
                chatEl.appendChild(div);
            });
            chatEl.scrollTop = chatEl.scrollHeight;
        }

        function postToSanctuary() {
            const input = document.getElementById('sanctuary-input');
            const text = input.value.trim();
            if (!text || !currentUser.name) return;

            messages.unshift({
                user: currentUser.name,
                photo: currentUser.photo || "🌊",
                text: text,
                time: "just now"
            });
            input.value = '';
            renderChat();

            // Gentle community reply
            setTimeout(() => {
                if (messages.length > 6) return;
                const communityReplies = [
                    { user: "Jane", photo: "🌿", text: "Thank you for sharing your light in the Sanctuary 💛", time: "just now" },
                    { user: "Aisha", photo: "🌸", text: "This is why I love being here. Beautiful energy!", time: "just now" }
                ];
                messages.unshift(communityReplies[Math.floor(Math.random() * communityReplies.length)]);
                renderChat();
            }, 1600);
        }

        // Camera functions
        let videoStream = null;
        function startCamera() {
            const video = document.getElementById('video');
            video.classList.remove('hidden');
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(stream => {
                    videoStream = stream;
                    video.srcObject = stream;
                })
                .catch(err => alert("Camera access needed for photo capture 🌿"));
        }

        function capturePhoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth || 300;
            canvas.height = video.videoHeight || 300;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            currentUser.photo = canvas.toDataURL('image/jpeg', 0.85);
            
            // Stop camera
            if (videoStream) videoStream.getTracks().forEach(track => track.stop());
            video.classList.add('hidden');
            
            // Show preview
            document.getElementById('photo-preview').classList.remove('hidden');
            document.getElementById('captured-photo').src = currentUser.photo;
        }

        function retakePhoto() {
            document.getElementById('photo-preview').classList.add('hidden');
            startCamera();
        }

        function useDefaultAvatar() {
            currentUser.photo = "🌊";
            document.getElementById('photo-preview').classList.add('hidden');
        }

        function saveProfile() {
            const nameInput = document.getElementById('user-name').value.trim();
            if (!nameInput) {
                alert("Please enter your name to join the Sanctuary 🌿");
                return;
            }
            currentUser.name = nameInput;
            
            // Save to localStorage
            localStorage.setItem('sanctuaryUser', JSON.stringify(currentUser));
            
            // Hide setup and show chat
            document.getElementById('profile-setup').classList.add('hidden');
            document.getElementById('main-chat-area').classList.remove('hidden');
            
            // Show user avatar in chat input
            const avatarSmall = document.getElementById('user-avatar-small');
            avatarSmall.innerHTML = currentUser.photo.startsWith('data:') 
                ? `<img src="${currentUser.photo}" class="w-full h-full object-cover">` 
                : `<span class="text-3xl">${currentUser.photo}</span>`;
            
            renderChat();
        }

        // Load on page start
        window.addEventListener('load', () => {
            // Check if user already has profile
            const saved = localStorage.getItem('sanctuaryUser');
            if (saved) {
                currentUser = JSON.parse(saved);
                document.getElementById('profile-setup').classList.add('hidden');
                document.getElementById('main-chat-area').classList.remove('hidden');
                
                const avatarSmall = document.getElementById('user-avatar-small');
                avatarSmall.innerHTML = currentUser.photo.startsWith('data:') 
                    ? `<img src="${currentUser.photo}" class="w-full h-full object-cover">` 
                    : `<span class="text-3xl">${currentUser.photo}</span>`;
                
                renderChat();
            } else {
                document.getElementById('profile-setup').classList.remove('hidden');
            }
            
            // Capture photo button on video click
            const video = document.getElementById('video');
            video.addEventListener('click', () => {
                if (video.srcObject) capturePhoto();
            });
        });
    </script>
</body>
</html>
